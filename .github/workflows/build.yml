name: Build GDExtension

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, x86_32, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SCons
        run: pip install scons
      - name: Build debug
        run: scons platform=windows arch=${{ matrix.arch }} target=template_debug
      - name: Build release
        run: scons platform=windows arch=${{ matrix.arch }} target=template_release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: addons/audiostreamplus/*.dll
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SCons
        run: pip install scons
      - name: Build x86_64 debug
        run: scons platform=linux arch=x86_64 target=template_debug
      - name: Build x86_64 release
        run: scons platform=linux arch=x86_64 target=template_release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: addons/audiostreamplus/*.so
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SCons
        run: pip install scons
      - name: Build debug
        run: scons platform=macos arch=${{ matrix.arch }} target=template_debug
      - name: Build release
        run: scons platform=macos arch=${{ matrix.arch }} target=template_release
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: addons/audiostreamplus/*.framework
          if-no-files-found: error
