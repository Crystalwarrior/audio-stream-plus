name: Build GDExtension

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_32
          - os: windows-latest
            platform: windows
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SCons
        run: pip install scons
      - name: Build (debug + release)
        run: |
          scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_debug
          scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_release
      - name: Package
        shell: bash
        run: |
          cd addons/audiostreamplus
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a -tzip ../../${{ matrix.platform }}-${{ matrix.arch }}.zip . > /dev/null
          else
            zip -r ../../${{ matrix.platform }}-${{ matrix.arch }}.zip .
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.platform }}-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly build
          body: "Automated build from commit ${{ github.sha }}."
          artifacts: artifacts/**/*.zip
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
